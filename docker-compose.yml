services:
  # Spring Boot Backend
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: ember-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
    depends_on:
      - redis
    restart: unless-stopped

  # Redis (토큰 블랙리스트, 캐시)
  redis:
    image: redis:7-alpine
    container_name: ember-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
