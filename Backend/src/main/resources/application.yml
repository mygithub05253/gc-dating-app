spring:
  profiles:
    active: dev

  # Supabase Cloud (dev/prod 동일)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ember}
    username: ${DB_USERNAME:ember}
    password: ${DB_PASSWORD:ember1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:3000

---
# 로컬 개발 환경 (로컬 PostgreSQL + Swagger)
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:postgresql://localhost:5432/ember
    username: ember
    password: ember1234

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
      - http://10.0.2.2:8080

ai:
  service:
    url: http://localhost:8000
  internal-key: local-dev-key

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# 개발 환경 (Supabase Cloud)
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8080
      - http://10.0.2.2:8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# 운영 환경
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASS}

server:
  forward-headers-strategy: native

app:
  cors:
    allowed-origins:
      - http://localhost:3000
      - ${ADMIN_ORIGIN:}

ai:
  service:
    url: ${AI_SERVICE_URL:http://ai:8000}
  internal-key: ${INTERNAL_API_KEY:}

springdoc:
  swagger-ui:
    enabled: false
